<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" role="img" aria-labelledby="title desc">
  <title id="title">Prajwal B R  profile orbit</title>
  <desc id="desc">Abstract orbital lines on a deep field background with the name Prajwal B R.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07060d"/>
      <stop offset="55%" stop-color="#12101f"/>
      <stop offset="100%" stop-color="#0b1420"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0"/>
      <stop offset="35%" stop-color="#7ee787" stop-opacity="0.9"/>
      <stop offset="65%" stop-color="#c4a6ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="160" rx="12" fill="url(#bg)"/>
  <!-- Orbits -->
  <ellipse cx="450" cy="88" rx="310" ry="58" fill="none" stroke="url(#ring)" stroke-width="1.25" stroke-dasharray="6 14" opacity="0.85"/>
  <ellipse cx="450" cy="88" rx="220" ry="40" fill="none" stroke="#2d3b4f" stroke-width="1" stroke-dasharray="2 10" opacity="0.7"/>
  <ellipse cx="450" cy="88" rx="130" ry="24" fill="none" stroke="#7ee787" stroke-width="0.8" opacity="0.35"/>
  <!-- Core -->
  <circle cx="450" cy="88" r="7" fill="#c4a6ff" filter="url(#glow)"/>
  <circle cx="450" cy="88" r="3" fill="#0b1420"/>
  <!-- Name -->
  <text x="450" y="42" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#e8e6f3" letter-spacing="0.04em">Prajwal B R</text>
  <text x="450" y="68" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8da3b8" letter-spacing="0.28em">FULL-STACK · CLOUD · WEB3</text>
</svg>
