<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-labelledby="et ed">
  <title id="et">Echo Chase</title>
  <desc id="ed">SMIL-animated pulse chasing across an orbit track. No JavaScript.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="720" height="200" rx="14" fill="url(#bg)"/>
  <text x="360" y="32" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,monospace" font-size="11" letter-spacing="0.35em">ECHO CHASE</text>
  <ellipse cx="360" cy="110" rx="230" ry="52" fill="none" stroke="#30363d" stroke-width="2" stroke-dasharray="6 14"/>
  <ellipse cx="360" cy="110" rx="230" ry="52" fill="none" stroke="#c4a6ff" stroke-width="2" stroke-dasharray="50 400" stroke-linecap="round" opacity="0.85">
    <animate attributeName="stroke-dashoffset" from="0" to="-450" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <circle cy="110" r="11" fill="#7ee787" filter="url(#g)">
    <animate attributeName="cx" values="130;590;130" keyTimes="0;0.5;1" dur="5.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </circle>
  <circle cy="110" r="4" fill="#0d1117">
    <animate attributeName="cx" values="130;590;130" keyTimes="0;0.5;1" dur="5.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </circle>
  <text x="360" y="182" text-anchor="middle" fill="#6e7681" font-family="system-ui,sans-serif" font-size="11">SMIL animation - renders in GitHub README</text>
</svg>
