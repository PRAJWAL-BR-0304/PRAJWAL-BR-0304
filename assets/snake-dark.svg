<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-labelledby="sdt sdd">
  <title id="sdt">Contribution-style snake (dark)</title>
  <desc id="sdd">SMIL stroke-dash animation on a grid path. Fallback when GitHub Actions cannot publish Platane snk output.</desc>
  <defs>
    <pattern id="gd" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#30363d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="320" rx="12" fill="#0d1117"/>
  <rect width="800" height="320" rx="12" fill="url(#gd)" opacity="0.65"/>
  <text x="400" y="36" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,monospace" font-size="12" letter-spacing="0.2em">CONTRIBUTION SNAKE (SMIL)</text>
  <path id="mpd" fill="none" stroke="none" d="M 72 260 L 72 140 L 180 140 L 180 88 L 300 88 L 300 200 L 420 200 L 420 112 L 560 112 L 560 228 L 700 228 L 700 152 L 748 152"/>
  <path fill="none" stroke="#3fb950" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95"
        d="M 72 260 L 72 140 L 180 140 L 180 88 L 300 88 L 300 200 L 420 200 L 420 112 L 560 112 L 560 228 L 700 228 L 700 152 L 748 152"
        stroke-dasharray="120 900">
    <animate attributeName="stroke-dashoffset" from="0" to="-1020" dur="16s" repeatCount="indefinite"/>
  </path>
  <circle r="10" fill="#7ee787">
    <animateMotion dur="16s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#mpd"/>
    </animateMotion>
  </circle>
  <text x="400" y="302" text-anchor="middle" fill="#6e7681" font-family="system-ui,sans-serif" font-size="11">Enable Actions + workflow to swap in real contribution-grid snake from branch output</text>
</svg>
