name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Create release if missing and upload assets
        run: |
          # Ensure the readme-assets release exists
          gh release view readme-assets --repo "${{ github.repository }}" || \
          gh release create readme-assets --title "README Assets" --notes "Assets for the profile README" --repo "${{ github.repository }}"
          
          # Upload static assets
          gh release upload readme-assets assets/* --clobber --repo "${{ github.repository }}"
          
          # Upload generated snake SVGs
          gh release upload readme-assets \
            dist/github-contribution-grid-snake.svg \
            dist/github-contribution-grid-snake-dark.svg \
            --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
